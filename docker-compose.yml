name: chubbyts-framework-skeleton
services:
  node:
    container_name: chubbyts-framework-skeleton-node
    hostname: chubbyts-framework-skeleton-node
    build:
      dockerfile: ./docker/development/node/Dockerfile
      context: ./
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    userns_mode: keep-id
    environment:
      NODE_ENV: development
      SERVER_HOST: '0.0.0.0'
      SERVER_PORT: '1234'
      SSH_AUTH_SOCK: /ssh-agent
    ports:
      - '1235:1235'
    volumes:
      - ${PWD}/..:/app
      - $SSH_AUTH_SOCK:/ssh-agent
      # bash
      - ~/.bash_docker:/home/node/.bash_docker
      - ~/.bash_history:/home/node/.bash_history
      # zsh
      - ~/.zsh_docker:/home/node/.zsh_docker
      - ~/.zsh_history:/home/node/.zsh_history
      # git
      - ~/.gitconfig:/home/node/.gitconfig
      - ~/.gitignore:/home/node/.gitignore
      # npm
      - ~/.npmrc:/home/node/.npmrc
      # opencode - coding agent
      - ~/.config/opencode/tui.json:/home/node/.config/opencode/tui.json
      - ~/.local/share/opencode/auth.json:/home/node/.local/share/opencode/auth.json
  nginx:
    container_name: chubbyts-framework-skeleton-nginx
    hostname: chubbyts-framework-skeleton-nginx
    image: nginx:1
    environment:
      SERVER_PORT: '443'
      NODE_SERVER_HOST: 'node'
      NODE_SERVER_PORT: '1234'
    ports:
      - '443:443'
    volumes:
      - ./docker/development/nginx:/etc/nginx/templates
    depends_on:
      - node
